name: Atualizar Dashboard Meta Ads

on:
  schedule:
    # Executa todo dia às 08:00 BRT (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Permite execução manual pelo botão no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Atualizar data de última atualização no JSON
        run: |
          python3 - <<'EOF'
          import json
          from datetime import datetime, timezone, timedelta

          BRT = timezone(timedelta(hours=-3))
          now = datetime.now(BRT).isoformat()

          with open('data/campaign_data.json', 'r') as f:
              data = json.load(f)

          data['last_updated'] = now

          with open('data/campaign_data.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"Timestamp atualizado: {now}")
          EOF

      - name: Commit e push das atualizações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/campaign_data.json
          git diff --staged --quiet || git commit -m "chore: atualização automática dos dados $(date +'%Y-%m-%d %H:%M BRT')"
          git push
